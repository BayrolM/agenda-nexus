name: mobile
description: "Agenda Nexus - Gestión de empresas y cobros"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Estado
  flutter_riverpod: ^2.6.1

  # Navegación
  go_router: ^14.8.1

  # Supabase
  supabase_flutter: ^2.8.4

  # Variables de entorno
  flutter_dotenv: ^5.2.0

  # HTTP
  http: ^1.2.0
  shared_preferences: ^2.3.0

  # Notificaciones locales
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1
  permission_handler: ^11.4.0

  # UI
  table_calendar: ^3.2.0
  flutter_slidable: ^4.0.0

  # Modelos
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilidades
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  freezed: ^2.5.8
  json_serializable: ^6.8.0
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/db_nexus_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/

flutter_native_splash:
  # Color de fondo de pantalla.
  color: "#ffffff" #Color blanco

  # Ruta de la imagen
  image: "assets/images/db_nexus_logo.png"

  # Para que el logo no se deforme y quede en el centro
  color_dark: "#121212" #Color negro para modo oscuro
  image_dark: "assets/images/db_nexus_logo.png" #Ruta de la imagen en modo oscuro

  android_12:
    # Android 12+ tiene su propia manera de manejar las splash screens
    image: "assets/images/db_nexus_logo.png"
    image_dark: "assets/images/db_nexus_logo.png"
    color: "#ffffff" #Color blanco
    color_dark: "#121212" #Color negro para modo oscuro
    