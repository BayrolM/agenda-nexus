name: mobile
description: "Agenda Nexus - Gestión de empresas y cobros"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Estado
  flutter_riverpod: ^2.6.1

  # Navegación
  go_router: ^14.8.1

  # Supabase
  supabase_flutter: ^2.8.4

  # Variables de entorno
  flutter_dotenv: ^5.2.0

  # HTTP
  http: ^1.2.0
  shared_preferences: ^2.3.0

  # Notificaciones locales
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1
  permission_handler: ^11.4.0

  # UI
  table_calendar: ^3.2.0
  flutter_slidable: ^4.0.0

  # Modelos
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilidades
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  freezed: ^2.5.8
  json_serializable: ^6.8.0
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/db_nexus_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
